name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Security Audit
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        run: npm run build

      - name: Package
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          cp manifest.json main.js versions.json styles.css dist/
          cd dist
          zip -r "../obsidian-ai-link-summarizer-${GITHUB_REF_NAME}.zip" .

      - name: Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            versions.json
            styles.css
            obsidian-ai-link-summarizer-${{ github.ref_name }}.zip
