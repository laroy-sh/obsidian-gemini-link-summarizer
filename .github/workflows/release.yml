name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          cp manifest.json main.js versions.json styles.css dist/
          cd dist
          zip -r "../obsidian-ai-link-summarizer-${GITHUB_REF_NAME}.zip" .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            versions.json
            styles.css
            obsidian-ai-link-summarizer-${{ github.ref_name }}.zip
